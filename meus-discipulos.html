<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Discípulos — Portal M12</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#3d3d3d;--bg2:#2d2d2d;--bg3:#353535;
            --dark:#1a1a1a;--muted:#888;
            --gold:#c9a84c;--gold-dark:#a08234;--gold-light:#e8cc6a;
            --blue:#4a90c4;--blue-soft:rgba(74,144,196,.1);
            --lilac:#a87cc4;--lilac-soft:rgba(168,124,196,.1);
            --green:#2e7d32;--green-soft:rgba(46,125,50,.08);
            --red:#d32f2f;--red-soft:rgba(211,47,47,.08);
            --orange:#f57c00;--orange-soft:rgba(245,124,0,.08);
        }
        body{font-family:'Montserrat',sans-serif;background:var(--bg);min-height:100vh;margin:0;color:#fff}

        /* HEADER */
        .header{background:var(--bg2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100}
        .header-left{display:flex;align-items:center;gap:10px}
        .header-logos{display:flex;align-items:center;gap:6px}
        .header-logos img{opacity:.85}
        .header-title-area{display:flex;flex-direction:column}
        .header-title{color:#e0e0e0;font-size:.75rem;font-weight:700;letter-spacing:.8px}
        .header-sub{color:#666;font-size:.5rem;letter-spacing:.5px;margin-top:1px}
        .btn-voltar{padding:7px 16px;background:transparent;border:1px solid rgba(255,255,255,.12);color:#888;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:600;cursor:pointer;letter-spacing:.8px;transition:all .3s;text-transform:uppercase;text-decoration:none}
        .btn-voltar:hover{border-color:rgba(201,168,76,.3);color:var(--gold)}
        @media(max-width:600px){.header{padding:10px 14px}}

        .content{max-width:500px;margin:0 auto;padding:16px 14px 40px}

        /* GENERATION TABS */
        .gen-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
        .gen-tab{
            padding:9px 16px;border-radius:20px;
            background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
            color:#777;font-family:'Montserrat',sans-serif;
            font-size:.62rem;font-weight:700;cursor:pointer;
            transition:all .3s;letter-spacing:.5px;white-space:nowrap;
            flex-shrink:0;
        }
        .gen-tab:hover{border-color:rgba(255,255,255,.2);color:#ccc}
        .gen-tab.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.25);color:var(--gold)}
        .gen-tab .gen-count{
            display:inline-block;background:rgba(255,255,255,.08);
            padding:1px 6px;border-radius:8px;font-size:.5rem;
            margin-left:4px;color:#999;
        }
        .gen-tab.active .gen-count{background:rgba(201,168,76,.15);color:var(--gold)}

        /* MODE BADGE */
        .mode-badge{
            display:inline-block;padding:5px 12px;border-radius:6px;
            font-size:.55rem;font-weight:700;letter-spacing:1px;
            text-transform:uppercase;margin-bottom:16px;
        }
        .mode-edit{background:rgba(46,125,50,.08);border:1px solid rgba(46,125,50,.12);color:#66bb6a}
        .mode-view{background:rgba(74,144,196,.08);border:1px solid rgba(74,144,196,.12);color:#42a5f5}

        /* SEARCH */
        .search-wrap{margin-bottom:16px;position:relative}
        .search-input{width:100%;padding:11px 14px 11px 36px;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#e0e0e0;font-family:'Montserrat',sans-serif;font-size:.78rem;transition:all .3s}
        .search-input:focus{outline:none;border-color:rgba(201,168,76,.3)}
        .search-input::placeholder{color:#666}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.8rem;opacity:.4}

        /* REDE CARD */
        .rede-card{
            background:var(--bg2);border:1px solid rgba(255,255,255,.06);
            border-radius:12px;margin-bottom:10px;overflow:hidden;
            transition:all .3s;
        }
        .rede-card.expanded{border-color:rgba(201,168,76,.15)}
        .rede-header{
            padding:16px;cursor:pointer;position:relative;
        }
        .rede-header::after{
            content:'›';position:absolute;right:14px;top:50%;
            transform:translateY(-50%) rotate(0deg);font-size:1.1rem;
            color:rgba(255,255,255,.12);transition:all .3s;
        }
        .rede-card.expanded .rede-header::after{transform:translateY(-50%) rotate(90deg);color:rgba(201,168,76,.4)}

        .rede-name{font-size:.72rem;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
        .rede-leaders{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
        .leader-chip{
            display:flex;align-items:center;gap:6px;
            padding:5px 10px;border-radius:6px;
            font-size:.65rem;font-weight:600;
        }
        .leader-chip.masc{background:rgba(74,144,196,.08);color:var(--blue);border:1px solid rgba(74,144,196,.1)}
        .leader-chip.fem{background:var(--lilac-soft);color:var(--lilac);border:1px solid rgba(168,124,196,.12)}
        .leader-icon{font-size:.7rem}

        .rede-stats{display:flex;gap:16px}
        .rede-stat{font-size:.58rem;color:#777;display:flex;align-items:center;gap:4px}
        .rede-stat-num{font-weight:800;color:#ccc;font-size:.7rem}

        /* DISC LIST INSIDE REDE */
        .rede-body{display:none;border-top:1px solid rgba(255,255,255,.04);padding:12px 16px}
        .rede-card.expanded .rede-body{display:block}
        .rede-section-label{font-size:.52rem;font-weight:700;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}

        .disc-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 12px;background:var(--bg3);
            border-radius:8px;margin-bottom:6px;
            transition:all .2s;
        }
        .disc-item:last-child{margin-bottom:0}
        .disc-item-left{display:flex;align-items:center;gap:8px}
        .disc-item-name{font-size:.72rem;font-weight:600;color:#ddd}
        .disc-item-badge{padding:2px 8px;border-radius:8px;font-size:.48rem;font-weight:700;letter-spacing:.3px}
        .disc-item-meta{font-size:.55rem;color:#777;margin-top:2px}
        .disc-item-right{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}

        .act-btn{
            padding:6px 8px;border-radius:5px;
            font-family:'Montserrat',sans-serif;
            font-size:.5rem;font-weight:700;
            cursor:pointer;transition:all .3s;
            letter-spacing:.3px;text-transform:uppercase;
            border:none;display:flex;align-items:center;gap:3px;
            text-decoration:none;
        }
        .act-consolidacao{background:rgba(201,168,76,.08);color:var(--gold);border:1px solid rgba(201,168,76,.1)}
        .act-consolidacao:hover{background:rgba(201,168,76,.15)}
        .act-transferir{background:rgba(74,144,196,.08);color:var(--blue);border:1px solid rgba(74,144,196,.1)}
        .act-transferir:hover{background:rgba(74,144,196,.15)}
        .act-legitimar{background:var(--green-soft);color:#4caf50;border:1px solid rgba(46,125,50,.12)}
        .act-legitimar:hover{background:rgba(46,125,50,.15)}
        .act-deslegitimar{background:var(--orange-soft);color:var(--orange);border:1px solid rgba(245,124,0,.1)}
        .act-deslegitimar:hover{background:rgba(245,124,0,.15)}
        .act-desligar{background:var(--red-soft);color:var(--red);border:1px solid rgba(211,47,47,.1)}
        .act-desligar:hover{background:rgba(211,47,47,.15)}

        @media(max-width:500px){
            .disc-item{flex-direction:column;align-items:flex-start;gap:8px}
            .disc-item-right{width:100%;justify-content:flex-start}
        }

        /* EMPTY */
        .empty-state{text-align:center;padding:50px 20px}
        .empty-icon{font-size:2rem;margin-bottom:12px;opacity:.3}
        .empty-text{color:#777;font-size:.75rem;font-weight:600}
        .empty-sub{color:#555;font-size:.62rem;margin-top:4px}

        /* MODAL */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
        .modal-overlay.show{display:flex}
        .modal{background:var(--bg2);border-radius:14px;width:100%;max-width:380px;border:1px solid rgba(255,255,255,.08);overflow:hidden;animation:modalIn .25s ease}
        @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .modal-header{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
        .modal-title{font-size:.8rem;font-weight:700;color:#e0e0e0;letter-spacing:.5px}
        .modal-close{background:none;border:none;color:#666;font-size:1.3rem;cursor:pointer;line-height:1}
        .modal-close:hover{color:#fff}
        .modal-body{padding:18px 20px}
        .modal-body p{font-size:.73rem;color:#999;line-height:1.6;margin-bottom:14px}
        .modal-body p strong{color:#e0e0e0}
        .form-field{margin-bottom:14px}
        .form-field label{display:block;color:#aaa;font-size:.58rem;font-weight:600;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
        .form-field input,.form-field select,.form-field textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:#fff;font-family:'Montserrat',sans-serif;font-size:.78rem;transition:all .3s}
        .form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08)}
        .form-field select{color:#aaa}
        .form-field select option{background:var(--bg2);color:#fff}
        .form-field textarea{min-height:55px;resize:vertical}
        .form-field input::placeholder,.form-field textarea::placeholder{color:#555}
        .modal-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:flex-end;gap:10px}
        .btn-modal{padding:9px 18px;border:none;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:.66rem;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:.5px}
        .btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.1);color:#888}
        .btn-cancel:hover{border-color:rgba(255,255,255,.25);color:#ccc}
        .btn-green{background:rgba(46,125,50,.9);color:#fff}.btn-green:hover{background:var(--green)}
        .btn-blue{background:rgba(74,144,196,.9);color:#fff}.btn-blue:hover{background:var(--blue)}
        .btn-orange{background:rgba(245,124,0,.9);color:#fff}.btn-orange:hover{background:var(--orange)}
        .btn-red{background:rgba(211,47,47,.9);color:#fff}.btn-red:hover{background:var(--red)}
        .btn-modal:disabled{opacity:.5;cursor:not-allowed}
        .modal-alert{padding:8px;border-radius:6px;font-size:.68rem;text-align:center;display:none;margin-bottom:12px}
        .modal-alert.error{background:rgba(220,53,69,.12);border:1px solid rgba(220,53,69,.2);color:#ff6b6b;display:block}

        /* FOOTER */
        .footer{background:var(--bg2);padding:20px;text-align:center;border-top:1px solid rgba(255,255,255,.04);margin-top:12px}
        .footer-verse{color:#666;font-size:.62rem;font-style:italic;line-height:1.7}
        .footer-ref{color:#888;font-size:.58rem;font-weight:600;margin-top:3px}
        .footer-ministry{color:#555;font-size:.5rem;margin-top:10px;letter-spacing:2px;text-transform:uppercase}

        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .rede-card{animation:fadeUp .35s ease both}
    </style>
</head>

<script>
const API = 'https://workflow.autrix.com.br/webhook';
async function api(endpoint, body={}) {
    try { const r = await fetch(`${API}/${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); return await r.json(); }
    catch(e) { console.error(`Erro API [${endpoint}]:`,e); return null; }
}

let currentUser = null;
try { const s=sessionStorage.getItem('siao_user'); if(s) currentUser=JSON.parse(s); } catch(e){}

const CONFIG = { nomes:{1:'1ª Geração',2:'2ª Geração',3:'3ª Geração',4:'4ª Geração',5:'5ª Geração'} };

let directDisciples = [];
let fullNetwork = [];
let selectedGen = 1;
let selectedAction = null;
let expandedRede = null;

// DEMO: quando abre sem sessão (teste local)
if(!currentUser) {
    currentUser = { id:'demo', nome:'Demonstração', geracao:0, genero:'M', rede:'' };
    document.getElementById('headerSub').textContent = 'Modo demonstração (sem dados)';
}

// MASKS
function maskCPF(v){v=v.replace(/\D/g,'').slice(0,11);if(v.length>9)return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');if(v.length>6)return v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');if(v.length>3)return v.replace(/(\d{3})(\d{1,3})/,'$1.$2');return v;}
document.getElementById('legitimarEmail').addEventListener('input',e=>{e.target.value=maskCPF(e.target.value);});

// MODALS
function abrirModal(id){document.getElementById(id).classList.add('show');}
function fecharModal(id){document.getElementById(id).classList.remove('show');}

// ===== DATA =====
async function loadAll() {
    if(!currentUser) return;

    // Meus discípulos diretos
    const disc = await api('discipulos', {acao:'listar', lider_id:currentUser.id});
    directDisciples = Array.isArray(disc) ? disc.flat() : [];

    // Rede completa abaixo de mim
    const rede = await api('rede', {lider_id:currentUser.id});
    fullNetwork = Array.isArray(rede) ? rede.flat() : [];

    buildGenTabs();
    renderGeneration();
}

// ===== GEN TABS =====
function buildGenTabs() {
    const myGen = currentUser.geracao || 0;
    // Ensure selectedGen is valid
    if(selectedGen <= myGen) selectedGen = myGen + 1;

    const container = document.getElementById('genTabs');
    let html = '';

    for(let g = myGen+1; g <= 5; g++) {
        const count = fullNetwork.filter(d => d.geracao === g && d.usuario_id).length;
        const isActive = g === selectedGen ? 'active' : '';
        html += `<button class="gen-tab ${isActive}" data-gen="${g}">${CONFIG.nomes[g]||g+'ª Ger'}<span class="gen-count">${count}</span></button>`;
    }

    container.innerHTML = html;

    container.querySelectorAll('.gen-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedGen = parseInt(btn.dataset.gen);
            container.querySelectorAll('.gen-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGeneration();
        });
    });
}

// ===== RENDER GENERATION =====
function renderGeneration() {
    const myGen = currentUser.geracao || 0;
    const isEditable = (selectedGen === myGen + 1);

    // Mode badge
    const badge = document.getElementById('modeBadge');
    if(isEditable) {
        badge.innerHTML = '<span class="mode-badge mode-edit">&#9998; Sua geração — você pode editar</span>';
    } else {
        badge.innerHTML = '<span class="mode-badge mode-view">&#128065; Somente visualização</span>';
    }

    // Filter: discípulos desta geração na minha rede
    // Para a geração editável: vem de directDisciples
    // Para as demais: vem de fullNetwork
    let genDisciples;
    if(isEditable) {
        genDisciples = directDisciples;
    } else {
        genDisciples = fullNetwork.filter(d => d.geracao === selectedGen);
    }

    // Busca
    const busca = document.getElementById('searchInput').value.toLowerCase().trim();
    if(busca.length >= 2) {
        genDisciples = genDisciples.filter(d =>
            d.nome.toLowerCase().includes(busca) ||
            (d.rede && d.rede.toLowerCase().includes(busca))
        );
    }

    // Agrupar por rede
    const redes = {};
    genDisciples.forEach(d => {
        const rede = d.rede || 'Sem rede';
        if(!redes[rede]) redes[rede] = { nome: rede, masc:[], fem:[], discipulos:[] };
        if(d.usuario_id) {
            // É líder legitimado
            if(d.genero === 'M') redes[rede].masc.push(d);
            else redes[rede].fem.push(d);
        } else {
            redes[rede].discipulos.push(d);
        }
    });

    const redeArr = Object.values(redes);
    const container = document.getElementById('redeList');
    const empty = document.getElementById('emptyState');

    if(redeArr.length === 0 && genDisciples.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    container.innerHTML = redeArr.map((r, idx) => {
        const allMembers = [...r.masc, ...r.fem, ...r.discipulos];
        const lideres12 = [...r.masc, ...r.fem];
        // Contar rede abaixo desses líderes
        const liderIds = lideres12.filter(l=>l.usuario_id).map(l=>l.usuario_id);
        const redeCount = fullNetwork.filter(n => liderIds.includes(n.lider_id)).length;
        const isExpanded = expandedRede === r.nome ? 'expanded' : '';

        // Leader chips
        const mascChips = r.masc.map(l => `<div class="leader-chip masc"><span class="leader-icon">&#9794;</span>${l.nome}</div>`).join('');
        const femChips = r.fem.map(l => `<div class="leader-chip fem"><span class="leader-icon">&#9792;</span>${l.nome}</div>`).join('');
        const noLeaders = r.masc.length===0 && r.fem.length===0;

        // Discípulos inside
        const discHtml = allMembers.map(d => {
            const ehDoze = d.usuario_id !== null;
            const badgeClass = ehDoze ? 'badge-doze' : 'badge-discipulo';
            const badgeText = ehDoze ? '12' : 'Disc.';
            const badgeStyle = ehDoze
                ? 'background:rgba(201,168,76,.12);color:#c9a84c;border:1px solid rgba(201,168,76,.15)'
                : 'background:rgba(74,144,196,.1);color:#4a90c4;border:1px solid rgba(74,144,196,.12)';

            let actionsHtml = '';
            if(isEditable) {
                actionsHtml = `
                    <a class="act-btn act-consolidacao" href="consolidacao-form.html?discipulo_id=${d.id}&lider_id=${currentUser.id}&mode=edit" onclick="event.stopPropagation()">Consolidação</a>
                `;
            } else {
                actionsHtml = `<a class="act-btn act-consolidacao" href="consolidacao-form.html?discipulo_id=${d.id}&lider_id=${currentUser.id}&mode=view" onclick="event.stopPropagation()">Ver Consolidação</a>`;
            }

            return `
            <div class="disc-item">
                <div class="disc-item-left">
                    <div>
                        <div class="disc-item-name">${d.nome} <span class="disc-item-badge" style="${badgeStyle}">${badgeText}</span></div>
                        <div class="disc-item-meta">&#128241; ${d.telefone||'—'} &nbsp; &#128218; ${d.modulos||0}/8</div>
                    </div>
                </div>
                <div class="disc-item-right">${actionsHtml}</div>
            </div>`;
        }).join('');

        return `
        <div class="rede-card ${isExpanded}" style="animation-delay:${idx*0.05}s">
            <div class="rede-header" data-rede="${r.nome}" onclick="toggleRede(this.dataset.rede)">
                <div class="rede-name">&#127968; ${r.nome}</div>
                <div class="rede-leaders">
                    ${mascChips}
                    ${femChips}
                    ${noLeaders ? '<div class="leader-chip masc" style="opacity:.5">Sem líder</div>' : ''}
                </div>
                <div class="rede-stats">
                    <div class="rede-stat">&#128101; <span class="rede-stat-num">${allMembers.length}</span> discípulos</div>
                    <div class="rede-stat">&#127760; <span class="rede-stat-num">${redeCount}</span> na rede</div>
                </div>
            </div>
            <div class="rede-body">
                <div class="rede-section-label">Discípulos da rede</div>
                ${discHtml || '<div style="color:#666;font-size:.68rem;padding:8px 0">Nenhum discípulo nesta rede.</div>'}
            </div>
        </div>`;
    }).join('');
}

function toggleRede(nome) {
    expandedRede = expandedRede === nome ? null : nome;
    renderGeneration();
}

document.getElementById('searchInput').addEventListener('input', () => renderGeneration());

// Init: sempre mostra tabs, mesmo sem dados
buildGenTabs();
renderGeneration();

// Depois carrega dados reais
if(currentUser.id !== 'demo') loadAll();

// ===== ACTIONS =====
// Ações de Transferir, Legitimar e Desligar foram movidas para gestao-discipulos.html
</script>
