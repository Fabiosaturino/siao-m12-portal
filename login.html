<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Portal M12</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#3d3d3d;--bg2:#2d2d2d}
        body{
            font-family:'Montserrat',sans-serif;
            background:var(--bg);
            min-height:100vh;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:20px;
        }

        /* FLOATING ANIMATION */
        @keyframes float{
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-6px)}
        }
        .float-logo{animation:float 3s ease-in-out infinite}
        .float-logo:nth-child(2){animation-delay:.5s}

        /* LOGOS */
        .login-logo{
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:10px;margin-bottom:36px;
        }
        .login-logo img:first-child{opacity:.9}
        .login-logo img:last-child{opacity:.85}

        /* CONTAINER */
        .login-container{
            background:var(--bg2);
            border-radius:12px;
            width:100%;max-width:420px;
            border:1px solid rgba(255,255,255,.08);
            padding:30px 32px 34px;
        }

        .tab-title{
            color:#e0e0e0;
            font-size:.95rem;
            font-weight:600;
            text-align:center;
            margin-bottom:22px;
            letter-spacing:.5px;
        }

        /* FORM */
        .form-field{margin-bottom:14px}
        .form-field label{
            display:block;color:#bbb;
            font-size:.68rem;font-weight:500;
            margin-bottom:4px;letter-spacing:.5px;
            text-transform:uppercase;
        }
        .form-field input{
            width:100%;padding:11px 13px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.12);
            border-radius:7px;color:#fff;
            font-family:'Montserrat',sans-serif;
            font-size:.85rem;transition:all .3s;
        }
        .form-field input:focus{
            outline:none;
            border-color:rgba(255,255,255,.35);
            background:rgba(255,255,255,.1);
        }
        .form-field input::placeholder{color:#555}

        /* PASSWORD TOGGLE */
        .pw-wrap{position:relative}
        .pw-wrap input{padding-right:42px}
        .pw-toggle{
            position:absolute;right:10px;top:50%;
            transform:translateY(-50%);
            background:none;border:none;
            color:#888;cursor:pointer;
            font-size:1.1rem;padding:4px;line-height:1;
        }
        .pw-toggle:hover{color:#ccc}

        /* ALERTS */
        .alert{
            padding:10px;border-radius:7px;
            font-size:.75rem;margin-bottom:14px;
            text-align:center;display:none;
        }
        .alert-error{
            background:rgba(220,53,69,.15);
            border:1px solid rgba(220,53,69,.3);
            color:#ff6b6b;
        }

        /* BUTTON */
        .btn-primary{
            width:100%;padding:14px;
            background:transparent;
            border:1px solid rgba(201,168,76,.3);
            color:#c9a84c;
            border-radius:8px;
            font-family:'Montserrat',sans-serif;
            font-size:.85rem;font-weight:600;
            letter-spacing:2px;text-transform:uppercase;
            cursor:pointer;transition:all .4s ease;
            margin-top:6px;
        }
        .btn-primary:hover{
            background:linear-gradient(135deg,#a08234 0%,#c9a84c 40%,#e8cc6a 60%,#c9a84c 80%,#a08234 100%);
            color:#1a1a1a;border-color:rgba(201,168,76,.5);
            transform:translateY(-2px);
            box-shadow:0 6px 24px rgba(201,168,76,.18);
        }
        .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

        /* LINK PRIMEIRO ACESSO */
        .link-section{text-align:center;margin-top:18px}
        .link-section a{
            color:#aaa;font-size:.74rem;
            text-decoration:underline;
            transition:color .3s;
        }
        .link-section a:hover{color:#fff}

        /* FOOTER */
        .login-footer{
            text-align:center;margin-top:24px;
            color:#999;font-size:.7rem;
            font-style:italic;line-height:1.7;
            max-width:420px;
        }
        .login-footer strong{color:#bbb;font-style:normal}

        /* MOBILE */
        @media(max-width:480px){
            body{padding:16px}
            .login-container{padding:24px 20px 28px}
            .tab-title{font-size:.88rem}
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="loginContainer">
    <div class="tab-title">Acesso do Líder</div>

    <div class="alert alert-error" id="loginError">CPF ou senha incorretos.</div>

    <div class="form-field">
        <label>CPF</label>
        <input type="text" id="loginCpf" placeholder="000.000.000-00" maxlength="14" autocomplete="username">
    </div>

    <div class="form-field">
        <label>Senha</label>
        <div class="pw-wrap">
            <input type="password" id="loginSenha" placeholder="Digite sua senha" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password">
            <button type="button" class="pw-toggle" onclick="togglePw('loginSenha')">&#128065;</button>
        </div>
    </div>

    <button class="btn-primary" id="btnLogin">Entrar</button>

    <div class="link-section" id="primeiroAcessoLink">
        <a href="cadastro-lider.html">Primeiro Acesso? Cadastre-se aqui</a>
    </div>
</div>

<!-- VERSÍCULO -->
<div class="login-footer">
    "Assim como o ferro afia o ferro,<br>
    o homem afia o seu companheiro"<br>
    <strong>Provérbios 27:17</strong>
</div>

<script>
// ===== API CONFIG =====
const API = 'https://workflow.autrix.com.br/webhook';

async function api(endpoint, body = {}) {
    try {
        const res = await fetch(`${API}/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return await res.json();
    } catch (e) {
        console.error(`Erro API [${endpoint}]:`, e);
        return null;
    }
}

// ===== RESTAURAR SESSÃO =====
(function restoreSession() {
    try {
        const saved = sessionStorage.getItem('siao_user');
        if (saved) {
            window.location.href = 'dashboard.html';
        }
    } catch(e) {}
})();

// ===== TOGGLE SENHA =====
function togglePw(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ===== MÁSCARA CPF =====
function maskCPF(v) {
    v = v.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    if (v.length > 3) return v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    return v;
}
document.getElementById('loginCpf').addEventListener('input', e => {
    e.target.value = maskCPF(e.target.value);
});

// ===== VALIDAÇÃO: APENAS NÚMEROS EM SENHAS =====
document.getElementById('loginSenha').addEventListener('input', e => {
    e.target.value = e.target.value.replace(/\D/g, '');
});

// ===== VERIFICAR PRIMEIRO ACESSO =====
(async function checkPrimeiroAcesso() {
    try {
        const res = await api('primeiro-acesso', { acao: 'check' });
        const data = Array.isArray(res) ? res[0] : res;
        if (data && !data.vazio) {
            document.getElementById('primeiroAcessoLink').style.display = 'none';
        }
    } catch(e) {}
})();

// ===== LOGIN =====
document.getElementById('btnLogin').addEventListener('click', async () => {
    const cpf = document.getElementById('loginCpf').value;
    const senha = document.getElementById('loginSenha').value;
    const err = document.getElementById('loginError');
    const btn = document.getElementById('btnLogin');

    if (!cpf || !senha) {
        err.textContent = 'Preencha CPF e senha.';
        err.style.display = 'block';
        return;
    }

    btn.textContent = 'ENTRANDO...'; btn.disabled = true;

    const raw = await api('auth/login', { cpf, senha });
    const data = Array.isArray(raw) ? raw[0] : raw;

    if (data && data.sucesso) {
        err.style.display = 'none';
        const user = data.usuario;

        if (user.primeiro_acesso) {
            // Salvar temporário e redirecionar para trocar senha
            sessionStorage.setItem('siao_temp_user', JSON.stringify(user));
            window.location.href = 'trocar-senha.html';
        } else {
            sessionStorage.setItem('siao_user', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        }
    } else {
        err.textContent = (data && data.erro) || 'CPF ou senha incorretos.';
        err.style.display = 'block';
    }

    btn.textContent = 'ENTRAR'; btn.disabled = false;
});

// Enter para submeter
document.getElementById('loginSenha').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
});
document.getElementById('loginCpf').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginSenha').focus();
});
</script>

</body>
</html>
