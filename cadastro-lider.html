<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Liderança Sênior — Portal M12</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#3d3d3d;--bg2:#2d2d2d;
            --blue:#4a90c4;--blue-soft:rgba(74,144,196,.12);--blue-border:rgba(74,144,196,.25);
            --lilac:#a87cc4;--lilac-soft:rgba(168,124,196,.12);--lilac-border:rgba(168,124,196,.25);
            --gold:#c9a84c;--gold-dark:#a08234;--gold-light:#e8cc6a;
        }
        body{
            font-family:'Montserrat',sans-serif;
            background:var(--bg);
            min-height:100vh;
            display:flex;flex-direction:column;
            align-items:center;
            padding:20px 20px 40px;
        }

        @keyframes float{
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-6px)}
        }
        .float-logo{animation:float 3s ease-in-out infinite}
        .float-logo:nth-child(2){animation-delay:.5s}

        .login-logo{
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:10px;margin:30px 0 28px;
        }
        .login-logo img:first-child{opacity:.9}
        .login-logo img:last-child{opacity:.85}

        .page-title{
            color:#c0c0c0;font-size:.85rem;font-weight:600;
            letter-spacing:2px;text-transform:uppercase;
            text-align:center;margin-bottom:6px;
        }
        .page-subtitle{
            color:#888;font-size:.68rem;letter-spacing:1px;
            text-align:center;margin-bottom:28px;
        }

        /* ===== BLOCOS ===== */
        .section-block{
            background:var(--bg2);
            border-radius:14px;
            width:100%;max-width:420px;
            padding:26px 28px 28px;
            margin-bottom:18px;
            transition:all .3s;
        }
        .section-block.masc{
            border:1px solid var(--blue-border);
            box-shadow:0 2px 16px rgba(74,144,196,.06);
        }
        .section-block.fem{
            border:1px solid var(--lilac-border);
            box-shadow:0 2px 16px rgba(168,124,196,.06);
        }

        /* HEADER DO BLOCO */
        .section-header{
            display:flex;align-items:center;gap:12px;
            margin-bottom:20px;padding-bottom:14px;
        }
        .masc .section-header{border-bottom:1px solid var(--blue-border)}
        .fem .section-header{border-bottom:1px solid var(--lilac-border)}

        .section-icon{
            width:36px;height:36px;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:1rem;flex-shrink:0;
        }
        .masc .section-icon{background:var(--blue-soft);color:var(--blue)}
        .fem .section-icon{background:var(--lilac-soft);color:var(--lilac)}

        .section-title{
            font-size:.82rem;font-weight:700;color:#e0e0e0;
            text-transform:uppercase;letter-spacing:1px;
            transition:all .3s;
        }
        .section-sub{
            font-size:.58rem;color:#777;margin-top:2px;
            letter-spacing:.3px;font-weight:400;
        }

        /* ===== BOTÕES TÍTULO (Pastor/Apóstolo) ===== */
        .titulo-btns{
            display:flex;gap:8px;margin-bottom:18px;
        }
        .titulo-btn{
            flex:1;padding:9px 12px;
            background:rgba(255,255,255,.03);
            border-radius:8px;
            font-family:'Montserrat',sans-serif;
            font-size:.7rem;font-weight:600;
            text-align:center;cursor:pointer;
            transition:all .3s;letter-spacing:.5px;
        }
        /* Masculino */
        .masc .titulo-btn{
            border:1px solid rgba(74,144,196,.15);
            color:#6a9dc4;
        }
        .masc .titulo-btn:hover{
            border-color:rgba(74,144,196,.35);color:var(--blue);
        }
        .masc .titulo-btn.active{
            background:var(--blue-soft);
            border-color:var(--blue);color:var(--blue);
        }
        /* Feminino */
        .fem .titulo-btn{
            border:1px solid rgba(168,124,196,.15);
            color:#b09ac4;
        }
        .fem .titulo-btn:hover{
            border-color:rgba(168,124,196,.35);color:var(--lilac);
        }
        .fem .titulo-btn.active{
            background:var(--lilac-soft);
            border-color:var(--lilac);color:var(--lilac);
        }

        /* ===== FORM FIELDS ===== */
        .form-field{margin-bottom:14px}
        .form-field label{
            display:block;color:#bbb;font-size:.66rem;font-weight:500;
            margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;
        }
        .form-field input{
            width:100%;padding:11px 13px;
            background:rgba(255,255,255,.05);
            border:1px solid rgba(255,255,255,.1);
            border-radius:7px;color:#fff;
            font-family:'Montserrat',sans-serif;
            font-size:.85rem;transition:all .3s;
        }
        .masc .form-field input:focus{
            outline:none;border-color:var(--blue);
            background:rgba(74,144,196,.06);
            box-shadow:0 0 0 3px rgba(74,144,196,.08);
        }
        .fem .form-field input:focus{
            outline:none;border-color:var(--lilac);
            background:rgba(168,124,196,.06);
            box-shadow:0 0 0 3px rgba(168,124,196,.08);
        }
        .form-field input::placeholder{color:#555}

        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:480px){.form-row{grid-template-columns:1fr}}

        .pw-wrap{position:relative}
        .pw-wrap input{padding-right:42px}
        .pw-toggle{
            position:absolute;right:10px;top:50%;transform:translateY(-50%);
            background:none;border:none;color:#666;cursor:pointer;
            font-size:1rem;padding:4px;line-height:1;transition:color .3s;
        }
        .pw-toggle:hover{color:#ccc}

        /* ===== ALERTS ===== */
        .alert{
            padding:10px;border-radius:7px;font-size:.73rem;
            margin-bottom:14px;text-align:center;display:none;
        }
        .alert-error{
            background:rgba(220,53,69,.12);
            border:1px solid rgba(220,53,69,.25);color:#ff6b6b;
        }
        .alert-success{
            background:rgba(40,167,69,.12);
            border:1px solid rgba(40,167,69,.25);color:#6bff8e;
        }

        /* ===== BOTÃO CADASTRAR (Dourado) ===== */
        .btn-cadastrar{
            width:100%;padding:13px;
            background:linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 40%, var(--gold-light) 60%, var(--gold) 80%, var(--gold-dark) 100%);
            color:#1a1a1a;
            border:1px solid rgba(201,168,76,.3);
            border-radius:8px;
            font-family:'Montserrat',sans-serif;
            font-size:.76rem;font-weight:700;
            letter-spacing:1px;text-transform:uppercase;
            cursor:pointer;transition:all .3s;
            margin-top:8px;
            box-shadow:0 2px 12px rgba(201,168,76,.15);
        }
        .btn-cadastrar:hover{
            box-shadow:0 4px 20px rgba(201,168,76,.25);
            transform:translateY(-1px);
            border-color:rgba(201,168,76,.5);
        }
        .btn-cadastrar:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

        /* ===== LINKS ===== */
        .link-section{text-align:center;margin-top:10px}
        .link-section a{
            color:#aaa;font-size:.72rem;text-decoration:underline;
            transition:color .3s;
        }
        .link-section a:hover{color:#fff}

        .login-footer{
            text-align:center;margin-top:28px;
            color:#999;font-size:.7rem;font-style:italic;
            line-height:1.7;max-width:420px;
        }
        .login-footer strong{color:#bbb;font-style:normal}

        @media(max-width:480px){
            body{padding:16px 16px 32px}
            .section-block{padding:20px 18px 22px}
            .titulo-btn{font-size:.65rem;padding:8px 10px}
        }
    </style>
</head>

<div class="page-title">Primeiro Acesso</div>
<div class="page-subtitle">Cadastro da liderança sênior</div>

<!-- ===== BLOCO MASCULINO ===== -->
<div class="section-block masc">
    <div class="section-header">
        <div class="section-icon">&#9794;</div>
        <div>
            <div class="section-title" id="tituloMasc">Pastor Sênior</div>
            <div class="section-sub">Responsável pelos 12 homens</div>
        </div>
    </div>

    <div class="titulo-btns">
        <button class="titulo-btn active" onclick="setTitulo('masc','Pastor')">Pastor</button>
        <button class="titulo-btn" onclick="setTitulo('masc','Apóstolo')">Apóstolo</button>
    </div>

    <div class="alert alert-error" id="mascError"></div>
    <div class="alert alert-success" id="mascSuccess">Cadastro realizado!</div>

    <div class="form-field">
        <label>Nome completo *</label>
        <input type="text" id="pastorNome" placeholder="Nome completo">
    </div>
    <div class="form-field">
        <label>CPF *</label>
        <input type="text" id="pastorCpf" placeholder="000.000.000-00" maxlength="14">
    </div>
    <div class="form-field">
        <label>Telefone</label>
        <input type="text" id="pastorTel" placeholder="(00) 00000-0000" maxlength="15">
    </div>
    <div class="form-row">
        <div class="form-field">
            <label>Senha * (números)</label>
            <div class="pw-wrap">
                <input type="password" id="pastorSenha" placeholder="Crie uma senha" inputmode="numeric" pattern="[0-9]*" maxlength="8">
                <button type="button" class="pw-toggle" onclick="togglePw('pastorSenha')">&#128065;</button>
            </div>
        </div>
        <div class="form-field">
            <label>Confirmar *</label>
            <div class="pw-wrap">
                <input type="password" id="pastorSenha2" placeholder="Repita" inputmode="numeric" pattern="[0-9]*" maxlength="8">
                <button type="button" class="pw-toggle" onclick="togglePw('pastorSenha2')">&#128065;</button>
            </div>
        </div>
    </div>

    <button class="btn-cadastrar" id="btnCadMasc">Cadastrar Liderança Masculina</button>
</div>

<!-- ===== BLOCO FEMININO ===== -->
<div class="section-block fem">
    <div class="section-header">
        <div class="section-icon">&#9792;</div>
        <div>
            <div class="section-title" id="tituloFem">Pastora Sênior</div>
            <div class="section-sub">Responsável pelas 12 mulheres</div>
        </div>
    </div>

    <div class="titulo-btns">
        <button class="titulo-btn active" onclick="setTitulo('fem','Pastora')">Pastora</button>
        <button class="titulo-btn" onclick="setTitulo('fem','Apóstola')">Apóstola</button>
    </div>

    <div class="alert alert-error" id="femError"></div>
    <div class="alert alert-success" id="femSuccess">Cadastro realizado!</div>

    <div class="form-field">
        <label>Nome completo *</label>
        <input type="text" id="pastoraNome" placeholder="Nome completo">
    </div>
    <div class="form-field">
        <label>CPF *</label>
        <input type="text" id="pastoraCpf" placeholder="000.000.000-00" maxlength="14">
    </div>
    <div class="form-field">
        <label>Telefone</label>
        <input type="text" id="pastoraTel" placeholder="(00) 00000-0000" maxlength="15">
    </div>
    <div class="form-row">
        <div class="form-field">
            <label>Senha * (números)</label>
            <div class="pw-wrap">
                <input type="password" id="pastoraSenha" placeholder="Crie uma senha" inputmode="numeric" pattern="[0-9]*" maxlength="8">
                <button type="button" class="pw-toggle" onclick="togglePw('pastoraSenha')">&#128065;</button>
            </div>
        </div>
        <div class="form-field">
            <label>Confirmar *</label>
            <div class="pw-wrap">
                <input type="password" id="pastoraSenha2" placeholder="Repita" inputmode="numeric" pattern="[0-9]*" maxlength="8">
                <button type="button" class="pw-toggle" onclick="togglePw('pastoraSenha2')">&#128065;</button>
            </div>
        </div>
    </div>

    <button class="btn-cadastrar" id="btnCadFem">Cadastrar Liderança Feminina</button>
</div>

<div class="link-section">
    <a href="login.html">Já tenho acesso? Fazer login</a>
</div>

<div class="login-footer">
    "Assim como o ferro afia o ferro,<br>
    o homem afia o seu companheiro"<br>
    <strong>Provérbios 27:17</strong>
</div>

<script>
const API = 'https://workflow.autrix.com.br/webhook';

async function api(endpoint, body = {}) {
    try {
        const res = await fetch(`${API}/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return await res.json();
    } catch (e) {
        console.error(`Erro API [${endpoint}]:`, e);
        return null;
    }
}

function togglePw(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ===== SELETOR TÍTULO =====
const titulos = { masc: 'Pastor', fem: 'Pastora' };

function setTitulo(bloco, titulo) {
    titulos[bloco] = titulo;

    // Atualizar botões
    const block = document.querySelector(`.section-block.${bloco}`);
    block.querySelectorAll('.titulo-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    // Atualizar título do header
    if (bloco === 'masc') {
        document.getElementById('tituloMasc').textContent = titulo + ' Sênior';
    } else {
        document.getElementById('tituloFem').textContent = titulo + ' Sênior';
    }
}

// ===== MÁSCARAS =====
function maskCPF(v) {
    v = v.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    if (v.length > 3) return v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    return v;
}
function maskTel(v) {
    v = v.replace(/\D/g, '');
    if (v.length > 11) v = v.slice(0, 11);
    if (v.length > 6) return v.replace(/(\d{2})(\d{5})(\d{1,4})/, '($1) $2-$3');
    if (v.length > 2) return v.replace(/(\d{2})(\d{1,5})/, '($1) $2');
    return v;
}

['pastorCpf', 'pastoraCpf'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => { e.target.value = maskCPF(e.target.value); });
});
['pastorTel', 'pastoraTel'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => { e.target.value = maskTel(e.target.value); });
});
['pastorSenha', 'pastorSenha2', 'pastoraSenha', 'pastoraSenha2'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\D/g, '');
    });
});

// ===== VALIDAÇÃO =====
function validarBloco(nome, cpf, senha, senha2, label) {
    if (!nome) return `Preencha o nome do(a) ${label}.`;
    if (!cpf || cpf.replace(/\D/g, '').length < 11) return `CPF do(a) ${label} inválido.`;
    if (!senha) return `Preencha a senha do(a) ${label}.`;
    if (senha.length < 4) return `Senha deve ter pelo menos 4 números.`;
    if (!/^\d+$/.test(senha)) return `Senha deve conter apenas números.`;
    if (senha !== senha2) return `As senhas não coincidem.`;
    return null;
}

// ===== CADASTRO MASCULINO =====
document.getElementById('btnCadMasc').addEventListener('click', async () => {
    const err = document.getElementById('mascError');
    const suc = document.getElementById('mascSuccess');
    err.style.display = 'none'; suc.style.display = 'none';

    const nome = document.getElementById('pastorNome').value.trim();
    const cpf = document.getElementById('pastorCpf').value.trim();
    const tel = document.getElementById('pastorTel').value.trim();
    const senha = document.getElementById('pastorSenha').value;
    const senha2 = document.getElementById('pastorSenha2').value;

    const erro = validarBloco(nome, cpf, senha, senha2, titulos.masc);
    if (erro) { err.textContent = erro; err.style.display = 'block'; return; }

    const btn = document.getElementById('btnCadMasc');
    btn.textContent = 'CADASTRANDO...'; btn.disabled = true;

    const res = await api('primeiro-acesso', {
        acao: 'cadastrar_senior',
        titulo: titulos.masc,
        nome, cpf, telefone: tel, genero: 'M', senha
    });

    btn.textContent = 'CADASTRAR LIDERANÇA MASCULINA'; btn.disabled = false;

    const data = Array.isArray(res) ? res[0] : res;
    if (data && data.sucesso) {
        suc.style.display = 'block';
        btn.disabled = true;
        btn.style.opacity = '.4';
    } else {
        err.textContent = (data && data.erro) || 'Erro ao cadastrar. Tente novamente.';
        err.style.display = 'block';
    }
});

// ===== CADASTRO FEMININO =====
document.getElementById('btnCadFem').addEventListener('click', async () => {
    const err = document.getElementById('femError');
    const suc = document.getElementById('femSuccess');
    err.style.display = 'none'; suc.style.display = 'none';

    const nome = document.getElementById('pastoraNome').value.trim();
    const cpf = document.getElementById('pastoraCpf').value.trim();
    const tel = document.getElementById('pastoraTel').value.trim();
    const senha = document.getElementById('pastoraSenha').value;
    const senha2 = document.getElementById('pastoraSenha2').value;

    const erro = validarBloco(nome, cpf, senha, senha2, titulos.fem);
    if (erro) { err.textContent = erro; err.style.display = 'block'; return; }

    const btn = document.getElementById('btnCadFem');
    btn.textContent = 'CADASTRANDO...'; btn.disabled = true;

    const res = await api('primeiro-acesso', {
        acao: 'cadastrar_senior',
        titulo: titulos.fem,
        nome, cpf, telefone: tel, genero: 'F', senha
    });

    btn.textContent = 'CADASTRAR LIDERANÇA FEMININA'; btn.disabled = false;

    const data = Array.isArray(res) ? res[0] : res;
    if (data && data.sucesso) {
        suc.style.display = 'block';
        btn.disabled = true;
        btn.style.opacity = '.4';
    } else {
        err.textContent = (data && data.erro) || 'Erro ao cadastrar. Tente novamente.';
        err.style.display = 'block';
    }
});
</script>

</body>
</html>
