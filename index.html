<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministério Apostólico Sião — Portal M12</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#3d3d3d;
        }
        body{
            font-family:'Montserrat',sans-serif;
            background:var(--bg);
            min-height:100vh;
            margin:0;
        }

        /* FLOATING ANIMATION */
        @keyframes float{
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-6px)}
        }
        .float-logo{animation:float 3s ease-in-out infinite}
        .float-logo:nth-child(2){animation-delay:.5s}

        /* ===== SPLASH / COVER PAGE ===== */
        .splash-page{
            min-height:100vh;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:40px 20px;
            background:var(--bg);
            position:relative;overflow:hidden;
        }
        .splash-page::before{
            content:'';position:absolute;top:0;left:0;right:0;bottom:0;
            background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,.08) 0%,transparent 70%);
            pointer-events:none;
        }

        /* LOGOS */
        .splash-logos{
            display:flex;flex-direction:column;align-items:center;gap:16px;
            position:relative;z-index:1;margin-bottom:40px;
        }
        .splash-logos img:first-child{opacity:.95}
        .splash-logos img:last-child{height:65px;opacity:.85}

        /* LINHA DECORATIVA */
        .splash-line{
            width:50px;height:2px;background:#fff;opacity:.25;
            border-radius:2px;margin:8px 0 28px;position:relative;z-index:1;
        }

        /* TEXTOS — MAIS VISÍVEIS */
        .splash-text{
            color:#c0c0c0;
            font-size:.9rem;
            font-weight:600;
            letter-spacing:3px;
            text-transform:uppercase;
            text-align:center;
            position:relative;z-index:1;
            margin-bottom:10px;
        }
        .splash-subtitle{
            color:#999;
            font-size:.72rem;
            font-weight:400;
            letter-spacing:2px;
            text-transform:uppercase;
            text-align:center;
            position:relative;z-index:1;
            margin-bottom:52px;
        }

        /* BOTÃO */
        .btn-welcome{
            padding:16px 52px;
            background:transparent;
            border:1px solid rgba(201,168,76,.3);
            color:#c9a84c;
            border-radius:8px;
            font-family:'Montserrat',sans-serif;
            font-size:.85rem;
            font-weight:600;
            letter-spacing:2px;
            text-transform:uppercase;
            cursor:pointer;
            transition:all .4s ease;
            position:relative;z-index:1;
            text-decoration:none;
            display:inline-block;
        }
        .btn-welcome:hover{
            background:linear-gradient(135deg,#a08234 0%,#c9a84c 40%,#e8cc6a 60%,#c9a84c 80%,#a08234 100%);
            color:#1a1a1a;border-color:rgba(201,168,76,.5);
            transform:translateY(-2px);
            box-shadow:0 8px 30px rgba(201,168,76,.18);
        }

        /* VERSÍCULO */
        .splash-verse{
            position:absolute;bottom:32px;
            text-align:center;
            color:#999;
            font-size:.72rem;
            font-style:italic;
            line-height:1.7;
            z-index:1;
        }
        .splash-verse strong{
            color:#bbb;
            font-style:normal;
        }

        /* FADE-OUT (para transição futura) */
        .splash-page.fade-out{
            opacity:0;transform:scale(1.02);
            transition:all .5s ease;pointer-events:none;
        }

        /* MOBILE */
        @media(max-width:480px){
            .splash-text{font-size:.82rem;letter-spacing:2.5px}
            .splash-subtitle{font-size:.65rem;letter-spacing:1.5px;margin-bottom:40px}
            .btn-welcome{padding:14px 40px;font-size:.78rem}
            .splash-verse{font-size:.65rem;bottom:24px;padding:0 20px}
        }
    </style>
</head>
