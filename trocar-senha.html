<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Senha — Portal M12</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#3d3d3d;--bg2:#2d2d2d;
            --gold:#c9a84c;--gold-dark:#a08234;--gold-light:#e8cc6a;
        }
        body{
            font-family:'Montserrat',sans-serif;
            background:var(--bg);
            min-height:100vh;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:20px;
        }

        @keyframes float{
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-6px)}
        }
        .float-logo{animation:float 3s ease-in-out infinite}
        .float-logo:nth-child(2){animation-delay:.5s}

        .login-logo{
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:10px;margin-bottom:36px;
        }
        .login-logo img:first-child{opacity:.9}
        .login-logo img:last-child{opacity:.85}

        .login-container{
            background:var(--bg2);
            border-radius:14px;
            width:100%;max-width:420px;
            border:1px solid rgba(255,255,255,.08);
            padding:30px 32px 34px;
        }

        .tab-title{
            color:#e0e0e0;font-size:.95rem;font-weight:600;
            text-align:center;margin-bottom:8px;letter-spacing:.5px;
        }

        .welcome-msg{
            color:#999;font-size:.78rem;text-align:center;
            margin-bottom:22px;line-height:1.6;
        }
        .welcome-msg strong{color:#e0e0e0}

        .form-field{margin-bottom:14px}
        .form-field label{
            display:block;color:#bbb;font-size:.68rem;font-weight:500;
            margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;
        }
        .form-field input{
            width:100%;padding:11px 13px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.12);
            border-radius:7px;color:#fff;
            font-family:'Montserrat',sans-serif;
            font-size:.85rem;transition:all .3s;
        }
        .form-field input:focus{
            outline:none;border-color:rgba(201,168,76,.5);
            background:rgba(201,168,76,.06);
            box-shadow:0 0 0 3px rgba(201,168,76,.08);
        }
        .form-field input::placeholder{color:#555}

        .pw-wrap{position:relative}
        .pw-wrap input{padding-right:42px}
        .pw-toggle{
            position:absolute;right:10px;top:50%;transform:translateY(-50%);
            background:none;border:none;color:#666;cursor:pointer;
            font-size:1rem;padding:4px;line-height:1;transition:color .3s;
        }
        .pw-toggle:hover{color:#ccc}

        .alert{
            padding:10px;border-radius:7px;font-size:.73rem;
            margin-bottom:14px;text-align:center;display:none;
        }
        .alert-error{
            background:rgba(220,53,69,.12);
            border:1px solid rgba(220,53,69,.25);color:#ff6b6b;
        }
        .alert-success{
            background:rgba(40,167,69,.12);
            border:1px solid rgba(40,167,69,.25);color:#6bff8e;
        }

        .btn-salvar{
            width:100%;padding:14px;
            background:transparent;
            border:1px solid rgba(201,168,76,.3);
            color:var(--gold);
            border-radius:8px;
            font-family:'Montserrat',sans-serif;
            font-size:.85rem;font-weight:600;
            letter-spacing:2px;text-transform:uppercase;
            cursor:pointer;transition:all .4s ease;
            margin-top:6px;
        }
        .btn-salvar:hover{
            background:linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 40%, var(--gold-light) 60%, var(--gold) 80%, var(--gold-dark) 100%);
            color:#1a1a1a;border-color:rgba(201,168,76,.5);
            transform:translateY(-2px);
            box-shadow:0 6px 24px rgba(201,168,76,.18);
        }
        .btn-salvar:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

        /* ICON LOCK */
        .lock-icon{
            width:52px;height:52px;border-radius:50%;
            background:rgba(201,168,76,.1);
            border:1px solid rgba(201,168,76,.2);
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 18px;font-size:1.3rem;
        }

        .login-footer{
            text-align:center;margin-top:24px;
            color:#999;font-size:.7rem;font-style:italic;
            line-height:1.7;max-width:420px;
        }
        .login-footer strong{color:#bbb;font-style:normal}

        @media(max-width:480px){
            body{padding:16px}
            .login-container{padding:24px 20px 28px}
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="lock-icon">&#128274;</div>
    <div class="tab-title">Criar Senha Definitiva</div>
    <div class="welcome-msg">
        Bem-vindo(a), <strong id="nomeUsuario">Líder</strong>!<br>
        Crie sua senha definitiva para continuar.
    </div>

    <div class="alert alert-error" id="trocarError"></div>
    <div class="alert alert-success" id="trocarSuccess">Senha criada com sucesso! Entrando...</div>

    <div class="form-field">
        <label>Nova Senha (apenas números) *</label>
        <div class="pw-wrap">
            <input type="password" id="novaSenha" placeholder="Ex: 123456" inputmode="numeric" pattern="[0-9]*" maxlength="8">
            <button type="button" class="pw-toggle" onclick="togglePw('novaSenha')">&#128065;</button>
        </div>
    </div>

    <div class="form-field">
        <label>Confirmar Senha *</label>
        <div class="pw-wrap">
            <input type="password" id="confirmarSenha" placeholder="Repita a senha" inputmode="numeric" pattern="[0-9]*" maxlength="8">
            <button type="button" class="pw-toggle" onclick="togglePw('confirmarSenha')">&#128065;</button>
        </div>
    </div>

    <button class="btn-salvar" id="btnSalvar">Salvar Senha</button>
</div>

<div class="login-footer">
    "Assim como o ferro afia o ferro,<br>
    o homem afia o seu companheiro"<br>
    <strong>Provérbios 27:17</strong>
</div>

<script>
const API = 'https://workflow.autrix.com.br/webhook';

async function api(endpoint, body = {}) {
    try {
        const res = await fetch(`${API}/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return await res.json();
    } catch (e) {
        console.error(`Erro API [${endpoint}]:`, e);
        return null;
    }
}

function togglePw(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ===== SESSÃO TEMPORÁRIA =====
let tempUser = null;
try {
    const saved = sessionStorage.getItem('siao_temp_user');
    if (saved) {
        tempUser = JSON.parse(saved);
        document.getElementById('nomeUsuario').textContent = tempUser.nome;
    }
} catch(e) {}

// Se não tem sessão, mostra aviso mas não redireciona
if (!tempUser) {
    document.getElementById('nomeUsuario').textContent = 'Líder';
}

// ===== APENAS NÚMEROS =====
['novaSenha', 'confirmarSenha'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\D/g, '');
    });
});

// ===== SALVAR SENHA =====
document.getElementById('btnSalvar').addEventListener('click', async () => {
    const nova = document.getElementById('novaSenha').value;
    const confirmar = document.getElementById('confirmarSenha').value;
    const err = document.getElementById('trocarError');
    const suc = document.getElementById('trocarSuccess');
    err.style.display = 'none'; suc.style.display = 'none';

    if (!tempUser) {
        err.textContent = 'Sessão expirada. Faça login novamente.';
        err.style.display = 'block'; return;
    }

    if (!nova || !confirmar) {
        err.textContent = 'Preencha os dois campos.';
        err.style.display = 'block'; return;
    }
    if (nova !== confirmar) {
        err.textContent = 'As senhas não coincidem.';
        err.style.display = 'block'; return;
    }
    if (nova.length < 4) {
        err.textContent = 'Senha deve ter pelo menos 4 números.';
        err.style.display = 'block'; return;
    }
    if (!/^\d+$/.test(nova)) {
        err.textContent = 'Senha deve conter apenas números.';
        err.style.display = 'block'; return;
    }

    const btn = document.getElementById('btnSalvar');
    btn.textContent = 'SALVANDO...'; btn.disabled = true;

    const res = await api('trocar-senha', {
        usuario_id: tempUser.id,
        nova_senha: nova
    });

    btn.textContent = 'SALVAR SENHA'; btn.disabled = false;

    const data = Array.isArray(res) ? res[0] : res;
    if (data && data.sucesso) {
        suc.style.display = 'block';
        // Atualizar sessão: não é mais primeiro acesso
        tempUser.primeiro_acesso = false;
        sessionStorage.removeItem('siao_temp_user');
        sessionStorage.setItem('siao_user', JSON.stringify(tempUser));
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);
    } else {
        err.textContent = (data && data.erro) || 'Erro ao salvar senha. Tente novamente.';
        err.style.display = 'block';
    }
});

// Enter para submeter
document.getElementById('confirmarSenha').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnSalvar').click();
});
document.getElementById('novaSenha').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('confirmarSenha').focus();
